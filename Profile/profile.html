<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Gartic Phone UI Clone</title>
    <link rel="stylesheet" href="profile.css">
    <script src="profile.js" defer></script>
</head>
<body>

<div class="main-container">
    <div class="logo">
        <img src="https://garticphone.com/images/logo.svg" alt="Gartic Phone Logo">
        <p class="subtitle">Зіпсованний телефон</p>
    </div>

    <div class="game-card">
        <div class="left-section">
            <div class="tabs">
                <div class="tab active">АНОНІМНО</div>
            </div>
            
            <div class="profile-setup">
                <div class="avatar-container">
                    <div class="avatar-bg">
                        <div class="ghost-avatar">👻</div>
                    </div>
                    <button class="refresh-icon"></button>
                </div>

                <div class="input-group">
                    <label>Вибрати персонажа</label>
                    <input class="shoot" type="text" placeholder="Введіть нік">
                </div>

                <button class="start-btn">ПОЧАТИ</button>
            </div>

            <div class="input-group">
                <input class="room_id" type="text" placeholder="Введіть код гри">
            </div>
        </div>

        
    </div>
</div>

</body>
</html>
